<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuralic | Blockchain & I.O.T. Architecture</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .master-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Hides the Spline logo by pushing it off the bottom edge */
        .spline-frame {
            width: 100%;
            height: 108%;
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        spline-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Clean Enterprise Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            background: #000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(3); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-dot"></div></div>

    <div class="master-container">
        <div class="spline-frame">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.82/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/gEJQDfCHxhhxXulo/scene.splinecode" events-target="global"></spline-viewer>
        </div>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 1000);
        }

        // Wait for Spline to fire its load event
        const viewer = document.querySelector('spline-viewer');
        viewer.addEventListener('load', function() {
            hideLoader();
        });

        // Fallback — hide after 6 seconds no matter what
        setTimeout(hideLoader, 6000);
    </script>
</body>
</html>

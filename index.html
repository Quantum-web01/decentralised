<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .spline-frame {
            position: relative;
            width: 100%;
            height: 100%;
        }

        spline-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Cover the "Built with Spline" label - BIGGER & BETTER POSITIONED */
        .logo-cover {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 200px;  /* Increased from 140px */
            height: 60px;  /* Increased from 40px */
            background: #000;
            z-index: 100;
            pointer-events: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.6s ease;
        }

        .loader-ring {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-ring"></div></div>

    <div class="spline-frame">
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.84/build/spline-viewer.js"></script>
        <spline-viewer id="scene" url="https://prod.spline.design/gEJQDfCHxhhxXulo/scene.splinecode"></spline-viewer>
        <div class="logo-cover"></div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const loader = document.getElementById('loader');

        scene.addEventListener('load', () => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 600);
        });

        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 600);
        }, 8000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuralic | Blockchain & I.O.T. Architecture</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        .master-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        spline-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Hide the Built with Spline label */
        spline-viewer::part(logo) {
            display: none !important;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(3); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-dot"></div></div>

    <div class="master-container">
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>
        <spline-viewer url="https://prod.spline.design/hJxO5kHhUvv1jNLw66H5SKEo/scene.splinecode" events-target="global"></spline-viewer>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 1000);
        }

        const viewer = document.querySelector('spline-viewer');
        viewer.addEventListener('load', function() {
            hideLoader();
        });

        setTimeout(hideLoader, 6000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }
        
        #loader.fade-out { opacity: 0; pointer-events: none; }
        
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }
        
        @keyframes rotate { to { transform: rotate(360deg); } }
        
        spline-viewer { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-ring"></div></div>
    
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.82/build/spline-viewer.js"></script>
    <spline-viewer id="scene" url="https://prod.spline.design/gEJQDfCHxhhxXulo/scene.splinecode"></spline-viewer>
    
    <script>
        const scene = document.getElementById('scene');
        const loader = document.getElementById('loader');
        
        scene.addEventListener('load', () => setTimeout(() => loader.classList.add('fade-out'), 300));
        setTimeout(() => loader.classList.add('fade-out'), 8000);
    </script>
</body>
</html>
